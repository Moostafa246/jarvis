<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --sidebar-bg: #0d0d0d;
    --surface: #111111;
    --surface2: #181818;
    --border: #1e1e1e;
    --border2: #252525;
    --text: #e8e8e8;
    --text-muted: #444;
    --text-dim: #777;
    --accent: #7c6aff;
    --accent-dim: rgba(124,106,255,0.1);
    --accent-glow: rgba(124,106,255,0.2);
  }

  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  #layout { display: flex; height: 100vh; position: relative; }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.25s ease, width 0.25s ease, min-width 0.25s ease;
    z-index: 100;
  }

  /* Desktop collapse */
  @media (min-width: 641px) {
    #sidebar.collapsed { width: 0; min-width: 0; border-right: none; }
  }

  /* Mobile: sidebar overlays as a drawer */
  @media (max-width: 640px) {
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      transform: translateX(-100%);
      box-shadow: 4px 0 24px rgba(0,0,0,0.5);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    #sidebar.open ~ #sidebar-overlay { display: block; }
    /* On mobile, toggle button always visible in header — no sidebar toggle needed inside */
    #toggle-sidebar { display: flex; }
  }

  /* Close button inside sidebar header on mobile */
  #sidebar-close {
    display: none;
    width: 26px; height: 26px; border-radius: 6px; border: none;
    background: none; color: var(--text-dim); cursor: pointer;
    align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s;
  }
  #sidebar-close:hover { background: var(--surface2); color: var(--text); }
  @media (max-width: 640px) { #sidebar-close { display: flex; } }

  #sidebar-header {
    padding: 18px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  #logo { font-size: 12px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--text-muted); }
  #logo span { color: var(--accent); }

  #new-chat-btn {
    width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border2);
    background: none; color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  #new-chat-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  #sidebar-content { flex: 1; overflow-y: auto; padding: 8px 0; }
  #sidebar-content::-webkit-scrollbar { width: 3px; }
  #sidebar-content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .topic-group { margin-bottom: 4px; }

  .topic-header {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 16px; cursor: pointer;
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
    user-select: none; transition: color 0.15s;
  }
  .topic-header:hover { color: var(--text-dim); }
  .topic-arrow { transition: transform 0.15s; font-size: 8px; }
  .topic-header.open .topic-arrow { transform: rotate(90deg); }

  .topic-convs { display: none; }
  .topic-convs.open { display: block; }

  .conv-item {
    padding: 7px 16px 7px 26px;
    font-size: 12px; color: var(--text-dim);
    cursor: pointer; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; border-radius: 0;
    transition: background 0.1s, color 0.1s;
    position: relative;
  }
  .conv-item:hover { background: var(--surface); color: var(--text); }
  .conv-item.active {
    background: var(--accent-dim); color: var(--text);
    border-left: 2px solid var(--accent); padding-left: 24px;
  }
  .conv-date { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  /* ── Main ── */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; width: 100%; }
  #messages { max-width: 800px; width: 100%; margin: 0 auto; align-self: stretch; }
  #input-area { max-width: 800px; width: 100%; margin: 0 auto; }

  #header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #toggle-sidebar {
    width: 28px; height: 28px; border: none; background: none;
    color: var(--text-muted); cursor: pointer; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  #toggle-sidebar:hover { background: var(--surface2); color: var(--text); }

  #conv-title-wrap { flex: 1; min-width: 0; }
  #conv-title {
    font-size: 13px; color: var(--text-dim); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; cursor: pointer;
    padding: 2px 6px; border-radius: 4px; transition: all 0.15s;
    display: inline-block; max-width: 100%;
  }
  #conv-title:hover { background: var(--surface2); color: var(--text); }
  #conv-title-input {
    display: none; background: var(--surface2); border: 1px solid var(--accent);
    border-radius: 4px; color: var(--text); font-size: 13px; padding: 2px 8px;
    outline: none; width: 300px; max-width: 100%;
  }

  #topic-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--accent); background: var(--accent-dim);
    padding: 2px 8px; border-radius: 20px; white-space: nowrap;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  #topic-badge:hover { background: var(--accent-glow); }
  #topic-badge.hidden { display: none; }

  #status-dot { width: 6px; height: 6px; border-radius: 50%;
    background: #2ecc71; box-shadow: 0 0 8px #2ecc71;
    transition: all 0.3s; flex-shrink: 0; }
  #status-dot.thinking { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow);
    animation: pulse 1.2s ease-in-out infinite; }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

  /* ── Messages ── */
  #messages { flex: 1; overflow-y: auto; padding: 28px 20px;
    display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .message { display: flex; flex-direction: column; gap: 6px; }
  .message.human { align-items: flex-end; }
  .message.human .bubble {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 16px 16px 4px 16px; padding: 10px 14px;
    max-width: 82%; color: var(--text);
  }
  .message.ai { align-items: flex-start; }
  .message.ai .bubble { max-width: 100%; color: var(--text); padding: 2px 0; }
  .message.ai .ai-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
  }

  .bubble p { margin-bottom: 10px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { color: #fff; font-weight: 600; }
  .bubble em { color: var(--text-dim); font-style: italic; }
  .bubble code { background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 4px; padding: 1px 5px; font-family: 'SF Mono',monospace;
    font-size: 12px; color: var(--accent); }
  .bubble pre { background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; margin: 10px 0; overflow-x: auto; }
  .bubble pre code { background:none; border:none; padding:0; color:#c9d1d9; font-size:13px; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin-bottom: 3px; }
  .bubble h1,.bubble h2,.bubble h3 { color:#fff; font-weight:600; margin: 14px 0 6px; }
  .bubble h1 { font-size:17px; } .bubble h2 { font-size:15px; } .bubble h3 { font-size:14px; }
  .bubble hr { border:none; border-top:1px solid var(--border); margin:14px 0; }

  .sources { margin-top: 8px; }
  .sources-toggle {
    display: flex; align-items: center; gap: 5px; cursor: pointer;
    font-size: 10px; color: var(--text-muted); user-select: none;
    width: fit-content; padding: 3px 0; transition: color 0.15s;
  }
  .sources-toggle:hover { color: var(--text-dim); }
  .sources-toggle svg { transition: transform 0.2s; }
  .sources-toggle.open svg { transform: rotate(90deg); }
  .sources-list { display: none; flex-direction: column; gap: 3px; margin-top: 5px; }
  .sources-list.open { display: flex; }
  .source-item {
    display: flex; align-items: center; gap: 7px; padding: 5px 9px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 5px; font-size: 11px; color: var(--text-dim);
  }
  .source-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); flex-shrink:0; opacity:.5; }
  .source-title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .source-date { color: var(--text-muted); flex-shrink:0; font-size:10px; }
  .source-score { color: var(--accent); opacity:.5; flex-shrink:0; font-family:monospace; font-size:10px; }

  .thinking-indicator { display:flex; align-items:center; gap:8px; color:var(--text-muted); font-size:13px; padding:2px 0; }
  .thinking-dots { display:flex; gap:4px; }
  .thinking-dots span { width:4px; height:4px; border-radius:50%; background:var(--accent); animation:blink 1.2s infinite; }
  .thinking-dots span:nth-child(2){animation-delay:.2s} .thinking-dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

  #empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center;
    flex:1; gap:10px; pointer-events:none; user-select:none; }
  #empty-state .big-label { font-size:26px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; color:#1a1a1a; }
  #empty-state .sub { font-size:12px; color:var(--text-muted); letter-spacing:.04em; }

  /* ── Input ── */
  #input-area { padding: 14px 20px 20px; flex-shrink: 0; border-top: 1px solid var(--border); }
  #input-wrapper { display:flex; align-items:flex-end; gap:10px; background:var(--surface);
    border:1px solid var(--border2); border-radius:12px; padding:10px 12px;
    transition: border-color 0.2s, box-shadow 0.2s; }
  #input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  #input { flex:1; background:none; border:none; outline:none; color:var(--text);
    font-size:15px; line-height:1.5; resize:none; max-height:160px; min-height:24px; font-family:inherit; }
  #input::placeholder { color: var(--text-muted); }
  #send-btn { width:30px; height:30px; border-radius:7px; border:none; background:var(--accent);
    color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:opacity .2s,transform .1s; padding:0; }
  #send-btn:hover{opacity:.85} #send-btn:active{transform:scale(.95)}
  #send-btn:disabled{opacity:.25;cursor:default}
  #hint { font-size:10px; color:var(--text-muted); text-align:center; margin-top:8px; letter-spacing:.03em; }
</style>
</head>
<body>
<div id="layout">

  <!-- Sidebar -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="logo">P<span>r</span>ive</div>
      <button id="sidebar-close" title="Close sidebar" onclick="closeSidebar()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button id="new-chat-btn" title="New conversation">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div id="sidebar-content"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="header">
      <button id="toggle-sidebar" title="Toggle sidebar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div id="conv-title-wrap">
        <span id="conv-title" title="Click to rename"></span>
        <input id="conv-title-input" type="text" placeholder="Conversation title...">
      </div>
      <div id="topic-badge" class="hidden"></div>
      <div id="status-dot"></div>
    </div>

    <div id="messages">
      <div id="empty-state">
        <div class="big-label">Prive</div>
        <div class="sub">Your memory. Your context. Ask anything.</div>
      </div>
    </div>

    <div id="input-area">
      <div id="input-wrapper">
        <textarea id="input" placeholder="Ask anything..." rows="1"></textarea>
        <button id="send-btn" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
      <div id="hint">⏎ send · ⇧⏎ new line</div>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const statusDot = document.getElementById('status-dot');
  const emptyState = document.getElementById('empty-state');
  const sidebarEl = document.getElementById('sidebar');
  const sidebarContent = document.getElementById('sidebar-content');
  const convTitleEl = document.getElementById('conv-title');
  const convTitleInput = document.getElementById('conv-title-input');
  const topicBadge = document.getElementById('topic-badge');

  let history = [];
  let isStreaming = false;
  let currentConvId = null;
  let sidebarCollapsed = false;

  // ── Sidebar ──
  const isMobile = () => window.innerWidth <= 640;

  function openSidebar() {
    if (isMobile()) {
      sidebarEl.classList.add('open');
    } else {
      sidebarEl.classList.remove('collapsed');
      sidebarCollapsed = false;
    }
  }

  function closeSidebar() {
    if (isMobile()) {
      sidebarEl.classList.remove('open');
    } else {
      sidebarEl.classList.add('collapsed');
      sidebarCollapsed = true;
    }
  }

  document.getElementById('toggle-sidebar').addEventListener('click', () => {
    if (isMobile()) {
      sidebarEl.classList.contains('open') ? closeSidebar() : openSidebar();
    } else {
      sidebarCollapsed ? openSidebar() : closeSidebar();
    }
  });

  // Start collapsed on mobile
  if (isMobile()) { sidebarEl.classList.remove('open'); }

  document.getElementById('new-chat-btn').addEventListener('click', () => { startNewConversation(); if (isMobile()) closeSidebar(); });

  function startNewConversation() {
    currentConvId = null;
    history = [];
    messagesEl.innerHTML = '';
    emptyState.style.display = '';
    emptyState.style.display = 'flex';
    messagesEl.appendChild(emptyState);
    convTitleEl.textContent = '';
    topicBadge.className = 'hidden';
    inputEl.focus();
  }

  async function loadSidebar() {
    const topics = await fetch('/conversations').then(r => r.json());
    sidebarContent.innerHTML = '';

    const slugs = Object.keys(topics);
    if (!slugs.length) {
      sidebarContent.innerHTML = '<div style="padding:16px;font-size:11px;color:var(--text-muted)">No conversations yet</div>';
      return;
    }

    for (const slug of slugs) {
      const { label, conversations } = topics[slug];
      const group = document.createElement('div');
      group.className = 'topic-group';

      const header = document.createElement('div');
      header.className = 'topic-header open';
      header.innerHTML = `<span class="topic-arrow">▶</span><span>${escHtml(label)}</span>`;
      header.addEventListener('click', () => {
        header.classList.toggle('open');
        convList.classList.toggle('open');
      });

      const convList = document.createElement('div');
      convList.className = 'topic-convs open';

      for (const conv of conversations) {
        const item = document.createElement('div');
        item.className = 'conv-item' + (conv.id === currentConvId ? ' active' : '');
        item.dataset.id = conv.id;
        const date = new Date(conv.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        item.innerHTML = `<div>${escHtml(conv.title)}</div><div class="conv-date">${date}</div>`;
        item.addEventListener('click', () => { loadConversation(conv.id); if (isMobile()) closeSidebar(); });
        convList.appendChild(item);
      }

      group.appendChild(header);
      group.appendChild(convList);
      sidebarContent.appendChild(group);
    }
  }

  async function loadConversation(convId) {
    const conv = await fetch(`/conversations/${convId}`).then(r => r.json());
    currentConvId = conv.id;
    history = conv.messages.map(m => ({ role: m.role === 'human' ? 'user' : m.role, content: m.content }));

    messagesEl.innerHTML = '';

    for (let i = 0; i < conv.messages.length; i++) {
      const m = conv.messages[i];
      const role = m.role === 'human' ? 'human' : 'ai';
      const el = appendMessage(role, m.content);
      if (role === 'ai') {
        el.querySelector('.bubble').innerHTML = renderMarkdown(m.content);
      }
    }

    updateConvHeader(conv);
    loadSidebar();
    scrollToBottom();
  }

  function updateConvHeader(conv) {
    convTitleEl.textContent = conv.title || '';
    if (conv.topic_label && conv.topic_slug !== 'uncategorized') {
      topicBadge.textContent = conv.topic_label;
      topicBadge.className = '';
    } else {
      topicBadge.className = 'hidden';
    }
  }

  // Inline title editing
  convTitleEl.addEventListener('click', () => {
    if (!currentConvId) return;
    convTitleInput.value = convTitleEl.textContent;
    convTitleEl.style.display = 'none';
    convTitleInput.style.display = 'inline-block';
    convTitleInput.focus();
    convTitleInput.select();
  });

  convTitleInput.addEventListener('blur', saveTitle);
  convTitleInput.addEventListener('keydown', e => { if (e.key === 'Enter') convTitleInput.blur(); });

  async function saveTitle() {
    const newTitle = convTitleInput.value.trim();
    convTitleInput.style.display = 'none';
    convTitleEl.style.display = '';
    if (!newTitle || !currentConvId) return;
    convTitleEl.textContent = newTitle;
    await fetch(`/conversations/${currentConvId}/rename`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: newTitle }),
    });
    loadSidebar();
  }

  // ── Chat ──
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    sendBtn.disabled = inputEl.value.trim().length === 0 || isStreaming;
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) send(); }
  });

  sendBtn.addEventListener('click', send);

  function send() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    // Hide empty state
    if (emptyState.parentNode) emptyState.parentNode.removeChild(emptyState);

    appendMessage('human', text);
    history.push({ role: 'user', content: text });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    isStreaming = true;
    statusDot.className = 'thinking';

    streamChat(text);
  }

  function appendMessage(role, text = '') {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (role === 'human') {
      div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
    } else {
      div.innerHTML = `<div class="ai-label">Prive</div><div class="bubble"></div><div class="sources"></div>`;
    }
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function renderSources(el, sources) {
    const top = sources.slice(0, 5);
    el.innerHTML = `
      <div class="sources-toggle" onclick="toggleSources(this)">
        <svg width="7" height="7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        ${top.length} sources
      </div>
      <div class="sources-list">
        ${top.map(s => `<div class="source-item">
          <div class="source-dot"></div>
          <div class="source-title">${escHtml(s.title)}</div>
          <div class="source-date">${s.date}</div>
          <div class="source-score">${s.score}</div>
        </div>`).join('')}
      </div>`;
  }

  function toggleSources(btn) {
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('open');
  }

  async function streamChat(message) {
    const msgEl = appendMessage('ai');
    const bubbleEl = msgEl.querySelector('.bubble');
    const sourcesEl = msgEl.querySelector('.sources');

    bubbleEl.innerHTML = `<div class="thinking-indicator"><div class="thinking-dots"><span></span><span></span><span></span></div></div>`;

    let fullText = '';
    let thinkingCleared = false;

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history: history.slice(0, -1), conversation_id: currentConvId }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = JSON.parse(line.slice(6));

          if (data.type === 'conv_id') {
            currentConvId = data.conversation_id;
          } else if (data.type === 'sources') {
            renderSources(sourcesEl, data.sources);
          } else if (data.type === 'text') {
            if (!thinkingCleared) { bubbleEl.innerHTML = ''; thinkingCleared = true; }
            fullText += data.text;
            bubbleEl.innerHTML = renderMarkdown(fullText);
            scrollToBottom();
          } else if (data.type === 'labeled') {
            topicBadge.textContent = data.topic_label;
            topicBadge.className = data.topic_slug !== 'uncategorized' ? '' : 'hidden';
            convTitleEl.textContent = data.title;
          } else if (data.type === 'done') {
            history.push({ role: 'assistant', content: fullText });
            loadSidebar();
          }
        }
      }
    } catch (err) {
      bubbleEl.innerHTML = `<span style="color:#e74c3c">Error: ${escHtml(err.message)}</span>`;
    }

    isStreaming = false;
    statusDot.className = '';
    sendBtn.disabled = inputEl.value.trim().length === 0;
    scrollToBottom();
  }

  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderMarkdown(text) {
    let html = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`\n]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^---$/gm, '<hr>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/^\* (.+)$/gm, '<li>$1</li>')
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
    return html;
  }

  // Init
  loadSidebar();
</script>
</body>
</html>
